name: Harness CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: harness-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate brain-core contracts (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.lock

      - name: Compile Python controls
        run: python -m compileall -q scripts tests

      - name: Parse Salesforce MCP launcher
        run: node --check scripts/start_salesforce_mcp.mjs

      - name: Validate harness structure and contracts
        run: python scripts/validate_harness.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run deterministic safety evaluations
        run: python scripts/run_evals.py

      - name: Confirm local and generated state is ignored
        run: git check-ignore config/harness.local.json .cache/ado-items/example.json output/handover/example.md
