name: Harness CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: harness-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate brain-core contracts (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install validation dependencies
        # --require-hashes verifies every downloaded artifact against the pinned sha256 set,
        # defeating index-substitution / version-hijack (matters most for the rpds-py binary wheel).
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.lock

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Install pinned Salesforce review runtime
        run: npm ci --ignore-scripts

      - name: Audit npm dependency tree
        # Hard-fail only on CRITICAL advisories in the production tree. The @salesforce/mcp
        # transitive tree currently carries lower-severity advisories that are not fixable from
        # here (pinned upstream); Dependabot surfaces and proposes fixes for those separately.
        run: npm audit --omit=dev --audit-level=critical

      - name: Compile Python controls
        run: python -m compileall -q scripts tests

      - name: Parse Salesforce MCP launcher
        run: |
          node --check scripts/start_salesforce_mcp.mjs
          node --check scripts/salesforce_review_server.mjs

      - name: Validate harness structure and contracts
        run: python scripts/validate_harness.py

      - name: Validate knowledge registry contract and index drift
        # validate_harness.py already runs these as grounding checks; the explicit step makes a
        # knowledge-store failure attributable in the CI log instead of a generic harness error.
        run: |
          python scripts/knowledge_registry.py validate
          python scripts/knowledge_registry.py render-indexes --check
          python scripts/knowledge_store.py entry-check

      - name: Report knowledge freshness (advisory)
        # Advisory only: expired/expiring claims are surfaced in the log for re-review
        # scheduling but never fail CI. A corrupt store already fails the validate step above.
        run: python scripts/knowledge_registry.py stale-report

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run deterministic safety evaluations
        run: python scripts/run_evals.py

      - name: Validate embedded Salesforce project tooling
        run: |
          npm run prettier:verify
          npm run lint
          npm run test:unit:ci

      - name: Confirm local and generated state is ignored
        shell: bash
        run: |
          # git check-ignore exits 0 if ANY argument is ignored, so check each path individually
          # to catch a single path that stops being ignored.
          for path in \
            config/harness.local.json \
            config/harness.json \
            .cache/ado-items/example.json \
            output/handover/example.md \
            .env \
            force-app/main/default/lwc/jsconfig.json \
            deploy-options.json; do
            git check-ignore -q "$path" || { echo "NOT IGNORED: $path"; exit 1; }
          done
