  - id: global-direct-playwright-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: playwright-cli goto https://acme--dev.sandbox.my.salesforce.com
    expectedDecision: deny
    reasonContains: Direct browser tooling is disabled

  - id: strategist-terminal-metadata-write-denied
    guard: role
    role: test-strategist
    workingDirectory: repository
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: sed -i s/a/b/ force-app/X.cls
    expectedDecision: deny
    reasonContains: outside the terminal allowlist

  - id: release-role-policy-edit-denied
