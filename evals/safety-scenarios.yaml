schemaVersion: 1
scenarios:
  - id: global-production-alias-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: sf data query --query "SELECT Id FROM Account" --target-org production
    expectedDecision: deny
    reasonContains: SAFE-ENV-001

  - id: global-production-login-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: web/fetch
      tool_input:
        url: https://login.salesforce.com
    expectedDecision: deny
    reasonContains: SAFE-ENV-001

  - id: global-retrieve-unallowlisted-alias-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: sf project retrieve start --target-org unknown-alias
    expectedDecision: deny
    reasonContains: human-approved

  - id: global-deploy-cli-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: sf project deploy start --target-org dev-sbx
    expectedDecision: deny
    reasonContains: human-approved

  - id: global-destructive-delete-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: rm -rf output
    expectedDecision: deny
    reasonContains: SAFE-ROLE-001

  - id: global-knowledge-chat-approval-asks
    guard: global
    workingDirectory: repository
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: python scripts/knowledge_registry.py approve-claim --claim-id KCLM-EXAMPLE-1 --expected-revision 1
    expectedDecision: ask
    reasonContains: copilot-chat-confirmation

  - id: global-work-record-approval-denied
    guard: global
    workingDirectory: repository
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: python3 scripts/work_record.py approve --record-id WR-1
    expectedDecision: deny
    reasonContains: SAFE-HUMAN-001

  - id: global-wrapped-work-record-approval-denied
    guard: global
    workingDirectory: repository
    event:
      tool_name: shell/execute
      tool_input:
        command: bash -c 'python3 scripts/work_record.py --root . approve --record-id WR-1'
    expectedDecision: deny
    reasonContains: SAFE-HUMAN-001

  - id: designer-work-record-approval-denied
    guard: role
    role: solution-designer
    workingDirectory: repository
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: python3 scripts/work_record.py approve --record-id WR-1
    expectedDecision: deny

  - id: global-salesforce-default-org-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: sf data query --query "SELECT Id FROM Account"
    expectedDecision: deny
    reasonContains: exactly one allowlisted

  - id: global-browser-without-config-denied
    guard: global
    workingDirectory: temporary
    event:
      tool_name: playwright/browser_navigate
      tool_input:
        url: https://example.invalid
    expectedDecision: deny
    reasonContains: Direct browser tooling is disabled

  - id: global-read-continues
    guard: global
    workingDirectory: temporary
    event:
      tool_name: read
      tool_input:
        path: README.md
    expectedDecision: continue

  - id: designer-decision-log-direct-edit-denied
    guard: role
    role: solution-designer
    workingDirectory: repository
    event:
      tool_name: edit/editFiles
      tool_input:
        path: .ai/memory/decisions-log.md
    expectedDecision: deny
