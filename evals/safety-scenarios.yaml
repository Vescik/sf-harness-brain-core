  - id: global-browser-non-sandbox-url-still-denied
    guard: global
    workingDirectory: repository
    event:
      tool_name: execute/runInTerminal
      tool_input:
        command: python scripts/playwright_guard.py goto https://acme.my.salesforce.com
    expectedDecision: deny

  - id: ado-call-without-runtime-policy-denied
    guard: global
    workingDirectory: repository
    event:
      tool_name: ado-readonly/wit_work_item
      tool_input:
        project: Other Project
        id: 1201
    expectedDecision: deny
    # Both branches of the ADO guard (missing local config, or org/project mismatch when a
    # local config is present) share this prefix, so the assertion holds whether or not the
    # developer has a config/harness.local.json checked out.
    reasonContains: "ADO read blocked"
