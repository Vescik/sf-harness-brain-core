  - id: role-ambiguous-edit-asks
    guard: role
    role: test-strategist
    workingDirectory: repository
    event:
      tool_name: edit/editFiles
      tool_input:
        content: proposed content without a target
    expectedDecision: ask
    reasonContains: could not be determined

  - id: role-read-continues
